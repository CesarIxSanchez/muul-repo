name: android_app
description: "Muul – Tourist app for FIFA World Cup 2026"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Mapa
  mapbox_maps_flutter: ^2.5.0

  # Geolocalización
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Backend
  supabase_flutter: ^2.5.0

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Utils
  http: ^1.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/